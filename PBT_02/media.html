<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Multimedia</title>
</head>

<body>
    <figure>
        <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:0/q:100/plain/https://cellphones.com.vn/media/wysiwyg/Phone/Apple/iPhone-17/iphone-17-pro-max-3_1.jpg"
            height="300" width="500" alt="iPhone 17 Pro Max màu cam" loading="lazy">
        <figcaption>iPhone 17 Pro Max 256GB màu cam</figcaption>
    </figure>

    <figure>
        <img src="https://cdn.tgdd.vn/Products/Images/54/315014/tai-nghe-bluetooth-airpods-pro-2nd-gen-usb-c-charge-apple-1-750x500.jpg"
            height="300" width="500" alt="Tai nghe AirPods" loading="lazy">
        <figcaption>Tai nghe AirPods không dây</figcaption>
    </figure>

    <figure>
        <img src="https://zshop.vn/images/thumbnails/2589/1908/detailed/52/Apple_Watch_Series_3_Space_Gray_Aluminum_Case_with_Black_Sport_Band__GPS_.jpg"
            height="300" width="500" alt="Nước lau sàn Sunlight" loading="lazy">
        <figcaption>Apple Watch</figcaption>
    </figure>

    <p>Video nhúng Youtube dùng thẻ iframe.</p>
    <iframe width="500" height="300" src="https://www.youtube.com/embed/4czjS9h4Fpg"
        title="Video tàu thăm dò Perseverance của NASA hạ cánh trên sao Hỏa" frameborder="0" allowfullscreen
        loading="lazy">
    </iframe>

    <p>Video dùng thẻ video.</p>
    <video controls poster="https://res.cloudinary.com/demo/video/upload/dog.jpg" width="500" height="300"
        loading="lazy">
        <source src="https://res.cloudinary.com/demo/video/upload/dog.webm" type="video/webm">
        <source src="https://res.cloudinary.com/demo/video/upload/dog.mp4" type="video/mp4">
        Trình duyệt của bạn không hỗ trợ video HTML5.
        <a href="https://res.cloudinary.com/demo/video/upload/dog.mp4">Tải video tại đây</a>.
    </video>

    <p>Một đoạn nhạc nền dùng thẻ audio.</p>
    <audio controls>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.ogg" type="audio/ogg">
        Trình duyệt của bạn không hỗ trợ thành phần âm thanh này.
    </audio>

    <figure>
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200" width="500" height="300"
            alt="Bàn làm việc với laptop và các thiết bị công nghệ hiện đại" loading="lazy"
            style="max-width: 100%; height: auto;">
        <figcaption>
            Một ví dụ về ảnh responsive
        </figcaption>
    </figure>

    <p>Một biểu tượng SVG hình tròn.</p>
    <svg>
        <circle cx="50" cy="50" r="40" fill="orange"></circle>
    </svg>

</body>

</html>
