<!doctype html>

<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
</head>

<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px">
        <h2 class="text-center mb-4">🌦️ Ứng dụng Dự báo Thời tiết</h2>

        <div class="input-group mb-3">
            <input type="text" id="city-input" class="form-control" placeholder="Nhập tên thành phố (Ví dụ: Hà Nội)">

            <button class="btn btn-primary" type="button" id="btn-search">Tìm</button>
        </div>

        <div id="history-container" class="mb-4">
            <span class="text-muted me-2">Lịch sử:</span>
            <button class="btn btn-sm btn-outline-secondary me-1">Hà Nội</button>
            <button class="btn btn-sm btn-outline-secondary me-1">Đà Nẵng</button>
        </div>

        <hr>

        <div id="layout-loading" class="text-center my-4 d-none">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Đang tải dữ liệu thời tiết...</p>
        </div>

        <div id="layout-success" class="card p-4 text-center shadow-sm">
            <h3 id="text-city" class="fw-bold">Hà Nội</h3>
            <h1 id="text-temp" class="display-3 fw-bold my-3">31.9°C</h1>
            <div class="d-flex justify-content-around text-muted mb-3">
                <span id="text-wind">Gió: 5.1 km/h</span>
                <span id="text-humidity">💧 Độ ẩm: --%</span>
            </div>

            <p id="text-description" class="card-text text-success fw-bold">
                Trạng thái: Đang chờ xử lý
            </p>
        </div>

        <div id="layout-error" class="alert alert-danger text-center my-4 d-none">
            ❌ Không tìm thấy thành phố hoặc mất kết nối mạng!
        </div>
    </div>

    <script src="app.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
